<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Quant Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        font-family: Arial;
        background: #111;
        color: #fff;
        padding: 30px;
        max-width: 1200px;
        margin: auto;
      }
      .card {
        background: #1c1c1c;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }
      .metric {
        font-size: 22px;
        font-weight: bold;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      td,
      th {
        padding: 8px;
        border-bottom: 1px solid #333;
        text-align: left;
      }
      button {
        padding: 8px 12px;
        margin-right: 8px;
        background: #333;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 6px;
      }
      button:hover {
        background: #555;
      }
      .heat {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 4px;
      }
      .box {
        height: 28px;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <h1>Market Microstructure Dashboard</h1>

    <div class="grid" id="metrics"></div>

    <div class="card">
      <h3>Strategy Selector</h3>
      <div id="buttons"></div>
    </div>

    <div class="card">
      <h3>PnL Graph</h3>
      <canvas id="pnlChart"></canvas>
    </div>

    <div class="card">
      <h3>Strategy Stats</h3>
      <div id="stats"></div>
    </div>

    <div class="card">
      <h3>Order Book</h3>
      <div class="grid">
        <div>
          <h4>Bids</h4>
          <table id="bids"></table>
        </div>
        <div>
          <h4>Asks</h4>
          <table id="asks"></table>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Trades</h3>
      <table id="trades"></table>
    </div>

    <div class="card">
      <h3>Heatmap (Snapshots)</h3>
      <div id="heatmap" class="heat"></div>
    </div>

    <script>
      let chart;

      // ===== FIX 1: Correct path (important) =====
      fetch("../backtest_results.json")
        .then((r) => r.json())
        .then((data) => {
          console.log(data); // DEBUG

          // ===== FIX 2: Safe checks to avoid crashes =====
          renderMetrics(data.metrics || {});
          renderBook(data.bids || [], data.asks || []);
          renderTrades(data.trades || []);
          renderHeatmap(data.snapshots || []);

          // ===== FIX 3: Handle missing strategies =====
          const strategies = data.strategies || {
            Spread: {
              pnl: 0,
              sharpe: 0,
              drawdown: 0,
              trades: 0,
              pnlHistory: [],
            },
          };

          renderButtons(strategies);
          loadStrategy("Spread", strategies);
        });

      function renderMetrics(m) {
        document.getElementById("metrics").innerHTML = `
<div class="card">Best Bid<div class="metric">${m.bestBid ?? 0}</div></div>
<div class="card">Best Ask<div class="metric">${m.bestAsk ?? 0}</div></div>
<div class="card">Spread<div class="metric">${m.spread ?? 0}</div></div>
<div class="card">Trades<div class="metric">${m.tradeCount ?? 0}</div></div>
`;
      }

      function renderBook(bids, asks) {
        let b = `<tr><th>Price</th><th>Qty</th></tr>`;

        // ===== FIX 4: Handle empty bids =====
        if (bids.length === 0) {
          b += `<tr><td colspan="2">No bids</td></tr>`;
        } else {
          bids.forEach(
            (x) => (b += `<tr><td>${x.price}</td><td>${x.qty}</td></tr>`),
          );
        }
        document.getElementById("bids").innerHTML = b;

        let a = `<tr><th>Price</th><th>Qty</th></tr>`;

        if (asks.length === 0) {
          a += `<tr><td colspan="2">No asks</td></tr>`;
        } else {
          asks.forEach(
            (x) => (a += `<tr><td>${x.price}</td><td>${x.qty}</td></tr>`),
          );
        }
        document.getElementById("asks").innerHTML = a;
      }

      function renderTrades(t) {
        let h = `<tr><th>Price</th><th>Qty</th><th>Buyer Id</th><th>Seller ID</th></tr>`;

        t.forEach((x) => {
          h += `<tr>
<td>${x.price}</td>
<td>${x.quantity}</td> <!-- FIX 5: correct field -->
<td>${x.buyId}</td>
<td>${x.sellId}</td>
</tr>`;
        });

        document.getElementById("trades").innerHTML = h;
      }

      function renderButtons(strats) {
        let html = "";

        // ===== FIX 6: Object iteration + correct onclick =====
        Object.keys(strats).forEach((k) => {
          html += `<button onclick='loadStrategy("${k}", window.strategies)'>${k}</button>`;
        });

        document.getElementById("buttons").innerHTML = html;

        // ===== FIX 7: store globally =====
        window.strategies = strats;
      }

      function loadStrategy(name, strats) {
        let s = strats[name];

        // ===== FIX 8: Safe rendering if missing =====
        if (!s) return;

        document.getElementById("stats").innerHTML = `
<div class="grid">
<div class="card">PnL<div class="metric">${(s.pnl ?? 0).toFixed(2)}</div></div>
<div class="card">Sharpe<div class="metric">${(s.sharpe ?? 0).toFixed(2)}</div></div>
<div class="card">Drawdown<div class="metric">${(s.drawdown ?? 0).toFixed(2)}</div></div>
<div class="card">Trades<div class="metric">${s.trades ?? 0}</div></div>
</div>
`;

        drawChart(name, s.pnlHistory || []);
      }

      function drawChart(name, data) {
        if (chart) chart.destroy();

        chart = new Chart(document.getElementById("pnlChart"), {
          type: "line",
          data: {
            labels: data.map((_, i) => i + 1),
            datasets: [
              {
                label: name + " PnL",
                data: data,
                borderWidth: 2,
              },
            ],
          },
        });
      }

      function renderHeatmap(snap) {
        let h = "";

        // ===== FIX 9: Your backend does NOT provide bidDepth/askDepth =====
        // Use timestamp-based placeholder intensity
        snap.forEach((x) => {
          let val = (x.timestamp % 10) * 25;

          h += `<div class="box" 
      style="background:rgb(${val},50,150)" 
      title="t=${x.timestamp}">
      </div>`;
        });

        document.getElementById("heatmap").innerHTML = h;
      }
    </script>
  </body>
</html>
